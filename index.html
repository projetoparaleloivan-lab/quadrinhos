<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acesso Liberado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script>
!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');

<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=37425935325492192&ev=PageView&noscript=1"/></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrapper{text-align:center;padding:40px 20px;max-width:480px;width:100%;}
.lock-icon{font-size:64px;margin-bottom:24px;display:block;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:scale(1);}to{transform:scale(1.1);}}
h1{font-size:24px;font-weight:800;margin-bottom:12px;line-height:1.2;}
.subtitle{color:#aaa;font-size:15px;margin-bottom:28px;line-height:1.6;}

/* Carrossel */
.carousel{position:relative;width:100%;margin-bottom:28px;border-radius:16px;overflow:hidden;background:#111;}
.carousel-track{display:flex;transition:transform 0.4s ease;}
.carousel-track img{width:100%;flex-shrink:0;object-fit:cover;border-radius:16px;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:22px;padding:8px 14px;cursor:pointer;border-radius:8px;z-index:10;}
.carousel-btn.prev{left:8px;}
.carousel-btn.next{right:8px;}
.carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:#444;cursor:pointer;transition:background 0.3s;}
.dot.active{background:#2AABEE;}

.counter-box{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;margin-bottom:28px;}
.counter-label{font-size:14px;color:#888;margin-bottom:10px;}
.counter-number{font-size:72px;font-weight:800;color:#fff;line-height:1;transition:all 0.3s ease;}
.counter-number.pulse{transform:scale(1.15);color:#2AABEE;}
.progress-bar{width:100%;height:6px;background:#222;border-radius:99px;margin-top:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#2AABEE,#1a8fd1);border-radius:99px;width:0%;transition:width 3s linear;}
.footer{margin-top:24px;color:#555;font-size:12px;}
.telegram-btn{display:inline-block;background:#2AABEE;color:#fff;text-decoration:none;padding:16px 28px;border-radius:14px;font-weight:700;font-size:16px;}
</style>
</head>
<body>
<div class="wrapper">
  <span class="lock-icon">🔓</span>
  <h1>Seu acesso está sendo liberado...</h1>
  <p class="subtitle">Confira a prévia exclusiva abaixo e entre no Telegram para ver tudo.</p>

  <div class="carousel">
    <div class="carousel-track" id="track">
      <img src="https://raw.githubusercontent.com/projetoparaleloivan-lab/quadrinhos/main/page01.jpg" alt="page 1"/>
      <img src="https://raw.githubusercontent.com/projetoparaleloivan-lab/quadrinhos/main/page02.jpg" alt="page 2"/>
      <img src="https://raw.githubusercontent.com/projetoparaleloivan-lab/quadrinhos/main/page03.jpg" alt="page 3"/>
      <img src="https://raw.githubusercontent.com/projetoparaleloivan-lab/quadrinhos/main/page04.jpg" alt="page 4"/>
      <img src="https://raw.githubusercontent.com/projetoparaleloivan-lab/quadrinhos/main/page05.jpg" alt="page 5"/>
      <img src="https://raw.githubusercontent.com/projetoparaleloivan-lab/quadrinhos/main/page06.jpg" alt="page 6"/>
    </div>
    <button class="carousel-btn prev" onclick="slide(-1)">&#8249;</button>
    <button class="carousel-btn next" onclick="slide(1)">&#8250;</button>
  </div>
  <div class="carousel-dots" id="dots"></div>

  <div class="counter-box" id="counterBox">
    <div class="counter-label">Liberando acesso em</div>
    <div class="counter-number" id="counter">3</div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>
  <div class="footer">Acesso exclusivo • Conteúdo +18</div>
</div>
<script>
const TELEGRAM = "https://t.me/Hqproibidas_bot";
const total = 6;
let current = 0;

const track = document.getElementById("track");
const dotsContainer = document.getElementById("dots");

for(let i=0;i<total;i++){
  const d = document.createElement("div");
  d.className = "dot" + (i===0?" active":"");
  d.onclick = ()=>goTo(i);
  dotsContainer.appendChild(d);
}

function goTo(n){
  current = n;
  track.style.transform = `translateX(-${current*100}%)`;
  document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("active",i===current));
}

function slide(dir){
  goTo((current+dir+total)%total);
}

// Auto slide
setInterval(()=>slide(1), 3000);

// Counter
let count = 3;
const counter = document.getElementById("counter");
const progress = document.getElementById("progress");
const counterBox = document.getElementById("counterBox");
setTimeout(function(){ progress.style.width = "100%"; }, 100);
const interval = setInterval(function(){
  count--;
  counter.classList.add("pulse");
  setTimeout(function(){ counter.classList.remove("pulse"); }, 300);
  if(count <= 0){
    clearInterval(interval);
    counterBox.innerHTML = `
      <div style="font-size:16px;color:#aaa;margin-bottom:18px;">Seu acesso foi liberado</div>
      <a href="${TELEGRAM}" class="telegram-btn" onclick="fbq('track','Lead');">ENTRAR NO TELEGRAM</a>
    `;
  } else {
    counter.textContent = count;
  }
}, 1000);
</script>
</body>
</html>
