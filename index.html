<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050505;
  color: #fff;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.wrapper {
  text-align: center;
  padding: 40px 30px;
  max-width: 420px;
  width: 100%;
}
.lock-icon {
  font-size: 64px;
  margin-bottom: 24px;
  display: block;
  animation: bounce 1s infinite alternate;
}
@keyframes bounce {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
h1 {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 12px;
  line-height: 1.2;
}
p {
  color: #aaa;
  font-size: 15px;
  margin-bottom: 36px;
  line-height: 1.6;
}
.counter-box {
  background: #111;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 28px;
}
.counter-label {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
}
.counter-number {
  font-size: 72px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
  transition: all 0.3s ease;
}
.counter-number.pulse {
  transform: scale(1.15);
  color: #2AABEE;
}
.progress-bar {
  width: 100%;
  height: 6px;
  background: #222;
  border-radius: 99px;
  margin-top: 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #2AABEE, #1a8fd1);
  border-radius: 99px;
  width: 0%;
  transition: width 3s linear;
}
.footer {
  margin-top: 24px;
  color: #555;
  font-size: 12px;
}
</style>
</head>
<body>
<div class="wrapper">
  <span class="lock-icon">🔓</span>
  <h1>Seu acesso está sendo liberado...</h1>
  <p>Você será redirecionado para o Telegram automaticamente.</p>

  <div class="counter-box">
    <div class="counter-label">Redirecionando em</div>
    <div class="counter-number" id="counter">3</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
  </div>

  <div class="footer">Acesso exclusivo • Conteúdo +18</div>
</div>

<script>
  var TELEGRAM = 'https://t.me/Hqproibidas_bot';
  var count = 3;
  var el = document.getElementById('counter');
  var progress = document.getElementById('progress');

  setTimeout(function() { progress.style.width = '100%'; }, 100);

  var interval = setInterval(function() {
    count--;
    el.classList.add('pulse');
    setTimeout(function() { el.classList.remove('pulse'); }, 300);
    if (count <= 0) {
      clearInterval(interval);
      el.textContent = '✓';
      window.location.href = TELEGRAM;
    } else {
      el.textContent = count;
    }
  }, 1000);
</script>
</body>
</html>
