<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Acesso Liberado</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:#fff;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.wrapper{
  text-align:center;
  padding:40px 30px;
  max-width:420px;
  width:100%;
}

.lock-icon{
  font-size:64px;
  margin-bottom:24px;
  animation:bounce 1s infinite alternate;
}

@keyframes bounce{
  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.1);
  }
}

h1{
  font-size:26px;
  font-weight:800;
  margin-bottom:12px;
  line-height:1.2;
}

p{
  color:#aaa;
  font-size:15px;
  margin-bottom:36px;
  line-height:1.6;
}

.counter-box{
  background:#111;
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:28px;
  margin-bottom:28px;
}

.counter-label{
  font-size:14px;
  color:#888;
  margin-bottom:10px;
}

.counter-number{
  font-size:72px;
  font-weight:800;
  line-height:1;
}

.progress-bar{
  width:100%;
  height:6px;
  background:#222;
  border-radius:99px;
  margin-top:20px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#2AABEE,#1a8fd1);
  transition:width 3s linear;
}

.footer{
  margin-top:24px;
  color:#555;
  font-size:12px;
}

.telegram-btn{
  display:inline-block;
  background:#2AABEE;
  color:#fff;
  text-decoration:none;
  padding:16px 28px;
  border-radius:14px;
  font-weight:700;
  font-size:16px;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="lock-icon">🔓</div>

  <h1>Seu acesso está sendo liberado...</h1>

  <p>
    Clique no botão abaixo para entrar no Telegram.
  </p>

  <div class="counter-box" id="counterBox">

    <div class="counter-label">
      Redirecionando em
    </div>

    <div class="counter-number" id="counter">
      3
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

  </div>

  <div class="footer">
    Acesso exclusivo • Conteúdo +18
  </div>

</div>

<script>
const TELEGRAM = "https://t.me/Hqproibidas_bot";

let count = 3;

const counter = document.getElementById("counter");
const progress = document.getElementById("progress");
const counterBox = document.getElementById("counterBox");

setTimeout(function(){
  progress.style.width = "100%";
},100);

const interval = setInterval(function(){

  count--;

  if(count <= 0){

    clearInterval(interval);

    counterBox.innerHTML = `
      <div style="font-size:16px;color:#aaa;margin-bottom:18px;">
        Seu acesso foi liberado
      </div>

      <a href="${TELEGRAM}" class="telegram-btn">
        ENTRAR NO TELEGRAM
      </a>
    `;

  }else{

    counter.textContent = count;

  }

},1000);
</script>

</body>
</html>
